name: release

# Build the desktop app + CLI for macOS (Apple Silicon + Intel), Windows and
# Linux.
#
# - Push a version tag (e.g. `v0.1.0`) to create a DRAFT GitHub Release with
#   all installers and standalone `hexkit` CLI archives attached.
# - Run manually (workflow_dispatch) to build and upload everything as
#   workflow artifacts (no release).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-target: aarch64-apple-darwin
            bin-suffix: ""
          - name: macos-x64
            platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust-target: x86_64-apple-darwin
            bin-suffix: ""
          - name: linux
            platform: ubuntu-22.04
            args: ""
            rust-target: x86_64-unknown-linux-gnu
            bin-suffix: ""
          - name: windows
            platform: windows-latest
            args: ""
            rust-target: x86_64-pc-windows-msvc
            bin-suffix: ".exe"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # ----- Build the standalone `hexkit` CLI ------------------------------
      # Built first so it can be copied into src-tauri/binaries/ as a Tauri
      # sidecar (named hexkit-cli to avoid colliding with the main binary).
      # The desktop app self-installs from this sidecar on demand.
      - name: Build hexkit CLI
        shell: bash
        run: |
          cargo build --release -p hexkit-cli --target "${{ matrix.rust-target }}"
          mkdir -p src-tauri/binaries
          SRC="target/${{ matrix.rust-target }}/release/hexkit${{ matrix.bin-suffix }}"
          DEST="src-tauri/binaries/hexkit-cli-${{ matrix.rust-target }}${{ matrix.bin-suffix }}"
          cp "$SRC" "$DEST"
          ls -la src-tauri/binaries/

      # ----- Build the desktop app (bundles the sidecar via externalBin) ----
      - name: Build app (+ draft release on tag)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ---- Optional code signing / notarization (set as repo secrets) ----
          # macOS:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri updater signing:
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && 'Hexkit __VERSION__' || '' }}
          releaseBody: "Download the installer for your platform from the assets below. Standalone `hexkit` CLI archives are also attached."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # ----- Package the CLI as a standalone archive + checksum -------------
      - name: Package CLI archive
        id: cli-archive
        shell: bash
        run: |
          NAME="hexkit-cli-${{ matrix.name }}"
          STAGE="dist-cli/$NAME"
          mkdir -p "$STAGE"
          cp "src-tauri/binaries/hexkit-cli-${{ matrix.rust-target }}${{ matrix.bin-suffix }}" \
             "$STAGE/hexkit${{ matrix.bin-suffix }}"
          cp LICENSE "$STAGE/"
          cp README.md "$STAGE/"
          cd dist-cli
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            powershell -NoLogo -NoProfile -Command "Compress-Archive -Path '$NAME' -DestinationPath '$NAME.zip' -Force"
            ARCHIVE="$NAME.zip"
          else
            tar -czf "$NAME.tar.gz" "$NAME"
            ARCHIVE="$NAME.tar.gz"
          fi
          # `shasum` is only on macOS; Linux + Windows git-bash ship `sha256sum`.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          fi
          echo "archive=dist-cli/$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "checksum=dist-cli/$ARCHIVE.sha256" >> "$GITHUB_OUTPUT"

      - name: Attach CLI archive to draft release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "${{ steps.cli-archive.outputs.archive }}" \
            "${{ steps.cli-archive.outputs.checksum }}" \
            --clobber

      - name: Upload artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: hexkit-${{ matrix.name }}
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/*/release/bundle/**
            ${{ steps.cli-archive.outputs.archive }}
            ${{ steps.cli-archive.outputs.checksum }}
