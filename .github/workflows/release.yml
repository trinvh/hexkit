name: release

# Release workflow — only fires on version tags or manual dispatch.
#
#   - `gate` runs first: typecheck + clippy + tests + build. One Linux
#     job, `make check`. Fails fast before the matrix spins up.
#   - `build` is the 4-platform matrix that builds the desktop app + CLI
#     archives. Runs only after `gate` is green.
#   - `publish` flips the draft release to published once every platform
#     has uploaded its artifacts. Only runs on tag pushes.
#
# So:
#   - Tag push (vX.Y.Z)      → gate → build (4×) → publish (auto, no draft)
#   - workflow_dispatch      → gate → build, uploaded as artifacts (no release)
#
# Day-to-day pushes to main and PRs no longer trigger this workflow —
# rely on `make check` locally before pushing.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

# Top-level permissions establish the GITHUB_TOKEN scope for every job.
# Some upstream actions (notably tauri-apps/tauri-action) have been seen to
# fail with "Resource not accessible by integration" when the workflow-level
# block is the only declaration — repos with a `read`-default GITHUB_TOKEN
# silently keep restricting the token. The job-level `permissions:` repeats
# below are belt-and-suspenders; they make the write scope explicit at the
# job boundary so a future repo-setting flip can't break releases again.
permissions:
  contents: write

jobs:
  gate:
    name: gate (typecheck · lint · test · build)
    runs-on: ubuntu-22.04
    # `gate` only reads the repo; no need for `contents: write`.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust (stable + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          shared-key: gate

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run the full gate
        run: make check

  build:
    name: build (${{ matrix.name }})
    needs: gate
    # Only run the matrix when we're actually shipping something.
    if: |
      startsWith(github.ref, 'refs/tags/') ||
      github.event_name == 'workflow_dispatch'

    # tauri-action creates the draft release and uploads installers; needs
    # write access to repository contents.
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-target: aarch64-apple-darwin
            bin-suffix: ""
          - name: macos-x64
            platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust-target: x86_64-apple-darwin
            bin-suffix: ""
          - name: linux
            platform: ubuntu-22.04
            args: ""
            rust-target: x86_64-unknown-linux-gnu
            bin-suffix: ""
          - name: windows
            platform: windows-latest
            args: ""
            rust-target: x86_64-pc-windows-msvc
            bin-suffix: ".exe"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          shared-key: build-${{ matrix.name }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # ----- Build the standalone `hexkit` CLI ------------------------------
      # Built first so it can be copied into src-tauri/binaries/ as a Tauri
      # sidecar (named hexkit-cli to avoid colliding with the main binary).
      # The desktop app self-installs from this sidecar on demand.
      - name: Build hexkit CLI
        shell: bash
        run: |
          cargo build --release -p hexkit-cli --target "${{ matrix.rust-target }}"
          mkdir -p src-tauri/binaries
          SRC="target/${{ matrix.rust-target }}/release/hexkit${{ matrix.bin-suffix }}"
          DEST="src-tauri/binaries/hexkit-cli-${{ matrix.rust-target }}${{ matrix.bin-suffix }}"
          cp "$SRC" "$DEST"
          ls -la src-tauri/binaries/

      # ----- Build the desktop app (bundles the sidecar via externalBin) ----
      - name: Build app (+ draft release on tag)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ---- Optional code signing / notarization (set as repo secrets) ----
          # macOS:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri updater signing:
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && 'Hexkit __VERSION__' || '' }}
          releaseBody: "Download the installer for your platform from the assets below. Standalone `hexkit` CLI archives are also attached."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # ----- Package the CLI as a standalone archive + checksum -------------
      - name: Package CLI archive
        id: cli-archive
        shell: bash
        run: |
          NAME="hexkit-cli-${{ matrix.name }}"
          STAGE="dist-cli/$NAME"
          mkdir -p "$STAGE"
          cp "src-tauri/binaries/hexkit-cli-${{ matrix.rust-target }}${{ matrix.bin-suffix }}" \
             "$STAGE/hexkit${{ matrix.bin-suffix }}"
          cp LICENSE "$STAGE/"
          cp README.md "$STAGE/"
          cd dist-cli
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            powershell -NoLogo -NoProfile -Command "Compress-Archive -Path '$NAME' -DestinationPath '$NAME.zip' -Force"
            ARCHIVE="$NAME.zip"
          else
            tar -czf "$NAME.tar.gz" "$NAME"
            ARCHIVE="$NAME.tar.gz"
          fi
          # `shasum` is only on macOS; Linux + Windows git-bash ship `sha256sum`.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          fi
          echo "archive=dist-cli/$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "checksum=dist-cli/$ARCHIVE.sha256" >> "$GITHUB_OUTPUT"

      - name: Attach CLI archive to draft release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "${{ steps.cli-archive.outputs.archive }}" \
            "${{ steps.cli-archive.outputs.checksum }}" \
            --clobber

      - name: Upload artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: hexkit-${{ matrix.name }}
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/*/release/bundle/**
            ${{ steps.cli-archive.outputs.archive }}
            ${{ steps.cli-archive.outputs.checksum }}

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-22.04
    # Only flip the draft once we know every platform's matrix job uploaded
    # its installer + CLI archive successfully.
    if: startsWith(github.ref, 'refs/tags/')
    # `gh release edit --draft=false` needs write access to repository contents.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Flip the draft release to published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --draft=false \
            --latest
          echo "Published https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
